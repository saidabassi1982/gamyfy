<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,maximum-scale=1" />
<meta name="theme-color" content="#071427" />
<title>Feud Buzzer</title>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
html,body{margin:0;height:100%;overflow:hidden;background:#071427;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
body{display:flex;flex-direction:column;padding:20px;gap:14px}
.header{display:flex;align-items:center;justify-content:space-between;font-size:13px;color:#b6c6dd}
.team-name{font-weight:900;font-size:26px;color:var(--team-color);text-align:center;letter-spacing:2px;text-transform:uppercase}
.status{text-align:center;font-size:14px;padding:8px;border-radius:8px;background:rgba(255,255,255,.06)}
.status.connecting{background:rgba(245,200,66,.16);color:#f5c842}
.status.connected{background:rgba(34,197,94,.16);color:#4ade80}
.status.error{background:rgba(239,68,68,.16);color:#fca5a5}
.phase{text-align:center;font-size:13px;color:#b6c6dd;font-weight:800;letter-spacing:1px;text-transform:uppercase;min-height:18px}
.btn-buzz{flex:1;border:none;border-radius:32px;font-family:inherit;font-size:54px;font-weight:900;letter-spacing:4px;cursor:pointer;text-shadow:0 2px 0 rgba(0,0,0,.4);transition:transform .08s,box-shadow .12s,background .15s,opacity .15s;position:relative;overflow:hidden}
.btn-buzz.armed{background:var(--team-color);color:#fff;box-shadow:0 12px 0 rgba(0,0,0,.35),0 0 80px var(--team-color),0 0 60px rgba(255,255,255,.12) inset;animation:armedPulse 1.2s ease-in-out infinite}
.btn-buzz.armed:active{transform:translateY(8px);box-shadow:0 4px 0 rgba(0,0,0,.35),0 0 60px rgba(255,255,255,.22) inset}
.btn-buzz.disarmed{background:#10213d;color:rgba(255,255,255,.4);box-shadow:0 4px 0 rgba(0,0,0,.25);cursor:not-allowed;font-size:22px;letter-spacing:1px}
.btn-buzz.you{background:linear-gradient(180deg,var(--team-color),rgba(0,0,0,.35));color:#fff;box-shadow:0 8px 0 rgba(0,0,0,.35);cursor:not-allowed;font-size:28px;letter-spacing:1px}
.btn-buzz.other{background:#1f2937;color:#cbd5e1;box-shadow:0 4px 0 rgba(0,0,0,.25);cursor:not-allowed;font-size:22px;letter-spacing:1px}
.btn-buzz.flash{animation:buzzFlash .35s}
.btn-buzz.shake{animation:buzzShake .35s}
.fast-card{display:none;flex:1;flex-direction:column;gap:14px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:24px;padding:18px}
.fast-card.active{display:flex}
.fast-kicker{font-size:12px;color:#facc15;font-weight:900;letter-spacing:2px;text-transform:uppercase;text-align:center}
.fast-question{flex:1;display:flex;align-items:center;justify-content:center;text-align:center;font-size:28px;font-weight:900;line-height:1.18}
.fast-input{width:100%;min-height:54px;border:1px solid rgba(255,255,255,.18);border-radius:14px;background:#071427;color:#fff;font-size:22px;font-weight:800;padding:0 14px;text-align:center;user-select:text;-webkit-user-select:text}
.fast-submit{min-height:58px;border:none;border-radius:14px;background:linear-gradient(180deg,var(--team-color),rgba(0,0,0,.25));color:#fff;font-size:18px;font-weight:900;letter-spacing:1px}
.fast-note{text-align:center;color:#b6c6dd;font-size:12px;font-weight:700;min-height:18px}
@keyframes armedPulse{0%,100%{filter:brightness(1)}50%{filter:brightness(1.18)}}
@keyframes buzzFlash{0%{filter:brightness(2.4)}100%{filter:brightness(1)}}
@keyframes buzzShake{0%{transform:translateX(0)}25%{transform:translateX(-12px)}50%{transform:translateX(12px)}75%{transform:translateX(-8px)}100%{transform:translateX(0)}}
.foot{font-size:10px;color:#64748b;text-align:center}
</style>
</head>
<body>
<div class="header">
  <span>Room <b id="room">-</b></span>
  <span id="status" class="status">Connecting...</span>
</div>
<div class="team-name" id="teamName">Team</div>
<div class="phase" id="phase">&nbsp;</div>
<button class="btn-buzz disarmed" id="buzz" disabled>Waiting...</button>
<div class="fast-card" id="fastCard">
  <div class="fast-kicker" id="fastKicker">Fast Money</div>
  <div class="fast-question" id="fastQuestion"></div>
  <input class="fast-input" id="fastAnswer" type="text" maxlength="40" autocomplete="off" />
  <button class="fast-submit" id="fastSubmit">Submit Answer</button>
  <div class="fast-note" id="fastNote"></div>
</div>
<div class="foot">Keep this page open. Tap only when the host arms buzzers. If needed, tap the status to enter the room code manually.</div>

<script>
const params = new URLSearchParams(location.search);
const room = (params.get('room') || '').toUpperCase();
const myTeam = parseInt(params.get('team') || '0', 10);
const myName = params.get('name') || `Team ${myTeam + 1}`;
const color = params.get('color') || '#3b82f6';
let activeRoom = room;
let peer = null;
let conn = null;
let retries = 0;
let retryTimer = null;

document.documentElement.style.setProperty('--team-color', color);
document.getElementById('room').textContent = activeRoom || '?';
document.getElementById('teamName').textContent = myName;
document.title = `Feud Buzzer - ${myName}`;

const statusEl = document.getElementById('status');
const phaseEl = document.getElementById('phase');
const buzzBtn = document.getElementById('buzz');
const fastCard = document.getElementById('fastCard');
const fastKicker = document.getElementById('fastKicker');
const fastQuestion = document.getElementById('fastQuestion');
const fastAnswer = document.getElementById('fastAnswer');
const fastSubmit = document.getElementById('fastSubmit');
const fastNote = document.getElementById('fastNote');
let lastArmed = false;
let lastState = { armed: false, winnerIdx: null, teams: [] };
let activePrompt = null;

function setStatus(msg, kind) {
  statusEl.textContent = msg;
  statusEl.className = 'status ' + (kind || '');
}
function vibrate(pattern) {
  if (navigator.vibrate) navigator.vibrate(pattern);
}
function applyState(state) {
  if (activePrompt) return;
  lastState = Object.assign(lastState, state);
  const winnerIdx = lastState.winnerIdx;
  let mode = 'disarmed';
  let label = 'Waiting...';
  let phase = 'Host will arm buzzers';

  if (winnerIdx === myTeam) {
    mode = 'you';
    label = 'You buzzed in!';
    phase = 'Answer now';
  } else if (winnerIdx !== null && winnerIdx !== undefined) {
    mode = 'other';
    label = 'Stand by';
    phase = `${lastState.teams[winnerIdx] || 'Other team'} buzzed first`;
  } else if (lastState.armed) {
    mode = 'armed';
    label = 'BUZZ';
    phase = 'Buzzers are live';
  }

  buzzBtn.className = 'btn-buzz ' + mode;
  buzzBtn.textContent = label;
  buzzBtn.disabled = mode !== 'armed';
  phaseEl.textContent = phase;

  if (mode === 'armed' && !lastArmed) vibrate([60, 40, 60]);
  lastArmed = mode === 'armed';
}

function showFastPrompt(data) {
  activePrompt = Object.assign({ mode: 'fast-money' }, data);
  buzzBtn.style.display = 'none';
  fastCard.classList.add('active');
  fastKicker.textContent = data.playerLabel || 'Fast Money';
  fastQuestion.textContent = data.question || '';
  fastAnswer.value = '';
  fastAnswer.disabled = false;
  fastSubmit.disabled = false;
  fastSubmit.textContent = 'Submit Answer';
  fastNote.textContent = data.player === 1 && data.questionIndex === 0
    ? 'Player 2: use the same team phone and try to reach 200.'
    : 'Type your answer and submit before time runs out.';
  phaseEl.textContent = 'Fast Money answer';
  setTimeout(() => fastAnswer.focus(), 80);
  vibrate([50, 30, 50]);
}

function showAnswerPrompt(data) {
  activePrompt = Object.assign({ mode: 'game-answer' }, data);
  buzzBtn.style.display = 'none';
  fastCard.classList.add('active');
  fastKicker.textContent = data.teamName ? `${data.teamName} ANSWER` : 'Your Answer';
  fastQuestion.textContent = data.question || 'Type your answer';
  fastAnswer.value = '';
  fastAnswer.disabled = false;
  fastSubmit.disabled = false;
  fastSubmit.textContent = 'Submit Answer';
  fastNote.textContent = 'Submit the answer you want the host board to check.';
  phaseEl.textContent = 'Answer now';
  setTimeout(() => fastAnswer.focus(), 80);
  vibrate([50, 30, 50]);
}

function clearFastPrompt(message) {
  activePrompt = null;
  fastCard.classList.remove('active');
  buzzBtn.style.display = '';
  fastNote.textContent = '';
  phaseEl.textContent = message || 'Host will arm buzzers';
  applyState(lastState);
}

function promptRoom() {
  const code = (prompt('Enter the 4-character room code from the host screen:') || '').trim().toUpperCase();
  if (!code) return;
  if (!/^[A-Z0-9]{4}$/.test(code)) {
    alert('Room code must be 4 letters/numbers.');
    return;
  }
  activeRoom = code;
  document.getElementById('room').textContent = activeRoom;
  retries = 0;
  statusEl.onclick = null;
  statusEl.style.cursor = '';
  startConnect();
}

function scheduleReconnect() {
  if (retryTimer) return;
  retries++;
  if (retries > 10) {
    setStatus('Could not reach host - tap to retry', 'error');
    statusEl.style.cursor = 'pointer';
    statusEl.onclick = () => {
      retries = 0;
      statusEl.onclick = null;
      statusEl.style.cursor = '';
      startConnect();
    };
    return;
  }
  const delay = Math.min(1000 * Math.pow(1.5, retries - 1), 6000);
  retryTimer = setTimeout(() => {
    retryTimer = null;
    startConnect();
  }, delay);
}

function startConnect() {
  if (!activeRoom) {
    setStatus('Tap to enter room code', 'error');
    phaseEl.textContent = 'Scan QR or enter the host room code';
    statusEl.style.cursor = 'pointer';
    statusEl.onclick = promptRoom;
    return;
  }
  if (typeof Peer === 'undefined') {
    setStatus('PeerJS not loaded', 'error');
    phaseEl.textContent = 'Check internet connection';
    return;
  }

  setStatus(retries > 0 ? `Reconnecting (${retries})...` : 'Connecting...', 'connecting');
  try { if (peer) peer.destroy(); } catch (err) {}
  peer = new Peer({ debug: 0 });
  peer.on('open', () => {
    conn = peer.connect('feud-' + activeRoom, { reliable: true });
    conn.on('open', () => {
      retries = 0;
      setStatus('Connected', 'connected');
      conn.send({ type: 'hello', team: myTeam });
    });
    conn.on('data', data => {
      if (!data || typeof data !== 'object') return;
      if (data.type === 'state') applyState(data);
      if (data.type === 'fast-money-prompt') showFastPrompt(data);
      if (data.type === 'fast-money-clear') clearFastPrompt();
      if (data.type === 'answer-prompt') showAnswerPrompt(data);
      if (data.type === 'answer-clear') clearFastPrompt();
    });
    conn.on('close', () => {
      setStatus('Reconnecting...', 'connecting');
      buzzBtn.className = 'btn-buzz disarmed';
      buzzBtn.textContent = 'Reconnecting...';
      buzzBtn.disabled = true;
      phaseEl.textContent = '';
      scheduleReconnect();
    });
    conn.on('error', () => scheduleReconnect());
  });
  peer.on('disconnected', () => {
    try { peer.reconnect(); } catch (err) { scheduleReconnect(); }
  });
  peer.on('error', err => {
    const type = err?.type || 'unknown';
    setStatus('Peer error: ' + type, 'error');
    buzzBtn.className = 'btn-buzz disarmed';
    buzzBtn.disabled = true;
    if (['peer-unavailable', 'server-error', 'socket-error', 'socket-closed', 'network'].includes(type)) {
      scheduleReconnect();
    }
  });
}

startConnect();

buzzBtn.addEventListener('click', () => {
  if (buzzBtn.classList.contains('armed') && conn && conn.open) {
    conn.send({ type: 'buzz', team: myTeam });
    buzzBtn.classList.add('flash');
    setTimeout(() => buzzBtn.classList.remove('flash'), 350);
    vibrate(50);
  } else {
    buzzBtn.classList.add('shake');
    setTimeout(() => buzzBtn.classList.remove('shake'), 350);
    vibrate([20, 40, 20]);
  }
});

function submitFastAnswer() {
  if (!activePrompt || !conn || !conn.open) return;
  const answer = fastAnswer.value.trim();
  if (!answer) {
    fastNote.textContent = 'Enter an answer first.';
    vibrate([20, 40, 20]);
    return;
  }
  if (activePrompt.mode === 'game-answer') {
    conn.send({
      type: 'game-answer',
      team: myTeam,
      answer
    });
  } else {
    conn.send({
      type: 'fast-money-answer',
      team: myTeam,
      player: activePrompt.player,
      questionIndex: activePrompt.questionIndex,
      answer
    });
  }
  fastAnswer.disabled = true;
  fastSubmit.disabled = true;
  fastSubmit.textContent = 'Submitted';
  fastNote.textContent = 'Answer sent to host.';
  vibrate(40);
}

fastSubmit.addEventListener('click', submitFastAnswer);
fastAnswer.addEventListener('keydown', e => {
  if (e.key === 'Enter') submitFastAnswer();
});
</script>
</body>
</html>
