<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,maximum-scale=1" />
<meta name="theme-color" content="#0a0640" />
<title>Buzzer</title>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
html,body{margin:0;height:100%;overflow:hidden;background:#0a0640;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
body{display:flex;flex-direction:column;padding:20px;gap:14px}
.header{display:flex;align-items:center;justify-content:space-between;font-size:13px;color:#aaa}
.team-name{font-weight:900;font-size:24px;color:var(--team-color);text-align:center;letter-spacing:2px}
.status{text-align:center;font-size:14px;padding:8px;border-radius:8px;background:rgba(255,255,255,.06)}
.status.connecting{background:rgba(255,180,0,.15);color:#ffb400}
.status.connected{background:rgba(39,196,107,.15);color:#27c46b}
.status.error{background:rgba(231,76,60,.15);color:#e74c3c}
.phase{text-align:center;font-size:13px;color:#aaa;font-weight:700;letter-spacing:1px;text-transform:uppercase;min-height:18px}
.btn-buzz{flex:1;border:none;border-radius:32px;
  font-family:inherit;font-size:54px;font-weight:900;letter-spacing:4px;
  cursor:pointer;text-shadow:0 2px 0 rgba(0,0,0,.4);
  transition:transform .08s,box-shadow .12s,background .15s,opacity .15s;
  position:relative;overflow:hidden}
.btn-buzz.armed{background:var(--team-color);color:#fff;
  box-shadow:0 12px 0 rgba(0,0,0,.3),0 0 80px var(--team-color),0 0 60px rgba(255,255,255,.1) inset;
  animation:armedPulse 1.2s ease-in-out infinite}
.btn-buzz.armed:active{transform:translateY(8px);box-shadow:0 4px 0 rgba(0,0,0,.3),0 0 60px rgba(255,255,255,.2) inset}
.btn-buzz.disarmed{background:#1a1455;color:rgba(255,255,255,.35);
  box-shadow:0 4px 0 rgba(0,0,0,.2);cursor:not-allowed;font-size:22px}
.btn-buzz.locked{background:#3a1a1a;color:rgba(255,100,100,.5);
  box-shadow:0 4px 0 rgba(0,0,0,.2);cursor:not-allowed;font-size:22px}
.btn-buzz.you{background:linear-gradient(180deg,var(--team-color),rgba(0,0,0,.4));color:#fff;
  box-shadow:0 8px 0 rgba(0,0,0,.3);cursor:not-allowed;font-size:28px}
.btn-buzz.flash{animation:buzzFlash .35s}
.btn-buzz.shake{animation:buzzShake .35s}
.phone-screen{flex:1;display:flex;flex-direction:column;gap:14px}
.phone-screen.hidden,.hidden{display:none!important}
.final-card{flex:1;display:flex;flex-direction:column;justify-content:center;gap:16px;
  border:2px solid var(--team-color);border-radius:24px;padding:22px;background:rgba(255,255,255,.06);
  box-shadow:0 0 40px rgba(255,255,255,.08) inset}
.final-kicker{text-align:center;color:#ffdf3d;font-weight:900;letter-spacing:2px;text-transform:uppercase}
.final-title{text-align:center;font-size:24px;font-weight:900;color:var(--team-color);letter-spacing:1px}
.final-copy{text-align:center;color:#d9e6ff;font-size:14px;line-height:1.45}
.final-clue{background:#eef1f8;color:#14224a;border-radius:16px;padding:18px;font-family:Georgia,serif;
  font-weight:800;text-align:center;text-transform:uppercase;line-height:1.25}
.final-input{width:100%;border:2px solid rgba(255,255,255,.35);border-radius:14px;padding:18px;
  background:#0e0e3a;color:#fff;font-size:24px;font-weight:900;text-align:center}
.final-input.answer{text-transform:uppercase;font-size:18px;text-align:left}
.final-submit{border:none;border-radius:18px;padding:18px;background:linear-gradient(180deg,var(--team-color),#1a1455);
  color:#fff;font-size:20px;font-weight:900;letter-spacing:1px;box-shadow:0 8px 0 rgba(0,0,0,.25)}
.final-submit:disabled{opacity:.45;box-shadow:none}
.locked-badge{align-self:center;border-radius:999px;padding:12px 20px;background:rgba(255,223,61,.18);
  color:#ffdf3d;font-size:18px;font-weight:900;letter-spacing:1px}
.type-panel{display:flex;flex-direction:column;gap:10px;margin-top:6px}
.type-panel.hidden{display:none!important}
.type-label{text-align:center;color:#ffdf3d;font-weight:900;font-size:13px;letter-spacing:1.5px;text-transform:uppercase}
.type-input{width:100%;background:#0e0e3a;color:#fff;border:2px solid var(--team-color,#7a2bd6);
  border-radius:18px;padding:18px;font-size:22px;font-weight:800;font-family:inherit;text-align:center;letter-spacing:1px;box-sizing:border-box}
.type-input:focus{outline:none;background:#1a1455;box-shadow:0 0 30px var(--team-color,#7a2bd6)}
.type-input::placeholder{color:rgba(255,255,255,.3);font-weight:600;letter-spacing:.5px;font-size:16px}
@keyframes armedPulse{
  0%,100%{filter:brightness(1)}
  50%{filter:brightness(1.18)}
}
@keyframes buzzFlash{0%{filter:brightness(2.4)}100%{filter:brightness(1)}}
@keyframes buzzShake{0%{transform:translateX(0)}25%{transform:translateX(-12px)}50%{transform:translateX(12px)}75%{transform:translateX(-8px)}100%{transform:translateX(0)}}
.foot{font-size:10px;color:#555;text-align:center}
</style>
</head>
<body>
<div class="header">
  <span>Room <b id="room">—</b></span>
  <span id="status" class="status">Connecting…</span>
</div>
<div class="team-name" id="teamName">…</div>
<div class="phase" id="phase">&nbsp;</div>
<button class="btn-buzz disarmed" id="buzz" disabled>Waiting…</button>
<div class="type-panel hidden" id="typePanel">
  <div class="type-label">Type your answer</div>
  <input class="type-input" id="typeInput" type="text" autocomplete="off" autocapitalize="characters" enterkeyhint="done" placeholder="Type the answer…" />
</div>
<div class="phone-screen hidden" id="finalScreen">
  <div class="final-card">
    <div class="final-kicker" id="finalKicker">Final Jeopardy</div>
    <div class="final-title" id="finalTitle">Waiting for host</div>
    <div class="final-copy" id="finalCopy">Keep this phone open.</div>
    <div class="final-clue hidden" id="finalClue"></div>
    <input class="final-input hidden" id="finalInput" />
    <button class="final-submit hidden" id="finalSubmit">Submit</button>
    <div class="locked-badge hidden" id="finalLocked">Locked</div>
  </div>
</div>
<div class="foot">Keep this page open. Tap when armed.</div>

<script>
const params=new URLSearchParams(location.search);
const room=(params.get('room')||'').toUpperCase();
const myTeam=parseInt(params.get('team')||'0',10);
const myName=params.get('name')||`Team ${myTeam+1}`;
const color=params.get('color')||'#7a2bd6';

document.documentElement.style.setProperty('--team-color',color);
document.getElementById('room').textContent=room||'?';
document.getElementById('teamName').textContent=myName;
document.title=`Buzzer — ${myName}`;

const statusEl=document.getElementById('status');
const phaseEl=document.getElementById('phase');
const buzzBtn=document.getElementById('buzz');
const finalScreen=document.getElementById('finalScreen');
const finalKicker=document.getElementById('finalKicker');
const finalTitle=document.getElementById('finalTitle');
const finalCopy=document.getElementById('finalCopy');
const finalClue=document.getElementById('finalClue');
const finalInput=document.getElementById('finalInput');
const finalSubmit=document.getElementById('finalSubmit');
const finalLocked=document.getElementById('finalLocked');
const typePanel=document.getElementById('typePanel');
const typeInput=document.getElementById('typeInput');

let connected=false;
let lastArmed=false;
let lastState={hasClue:false,activeIdx:null,attempted:[],ddSolo:false,cluePickerIdx:null,allowTyping:false,typedAnswer:''};
let lastFinalState={phase:'board'};

function setStatus(msg,kind){
  statusEl.textContent=msg;
  statusEl.className='status '+(kind||'');
}
function vibrate(pat){if(navigator.vibrate)navigator.vibrate(pat);}

function showFinalPhoneScreen(show){
  finalScreen.classList.toggle('hidden',!show);
  buzzBtn.classList.toggle('hidden',show);
}
function resetFinalControls(){
  finalClue.classList.add('hidden');
  finalInput.classList.add('hidden');
  finalSubmit.classList.add('hidden');
  finalLocked.classList.add('hidden');
  finalInput.value='';
  finalSubmit.disabled=false;
}
function applyFinalState(s){
  lastFinalState=Object.assign(lastFinalState,s);
  const phase=lastFinalState.phase||'board';
  const inFinal=phase.startsWith('final-');
  showFinalPhoneScreen(inFinal);
  if(!inFinal)return;
  resetFinalControls();
  finalKicker.textContent='Final Jeopardy';
  finalTitle.textContent=lastFinalState.category||'Final Jeopardy';
  if(!lastFinalState.isFinalist){
    finalCopy.textContent='Your team is not eligible for Final Jeopardy. Watch the host screen.';
    phaseEl.textContent='Watching Final Jeopardy';
    return;
  }
  if(phase==='final-wager'){
    phaseEl.textContent='Private wager';
    finalCopy.textContent=`Enter a wager from $0 to $${Number(lastFinalState.maxWager||0).toLocaleString()}.`;
    if(lastFinalState.wagerLocked){
      finalLocked.textContent='Wager locked';
      finalLocked.classList.remove('hidden');
      finalCopy.textContent='Your wager is locked. Wait for the host to reveal the clue.';
      return;
    }
    finalInput.type='number';
    finalInput.inputMode='numeric';
    finalInput.min='0';
    finalInput.max=String(lastFinalState.maxWager||0);
    finalInput.placeholder='$0';
    finalInput.className='final-input';
    finalSubmit.textContent='Lock Wager';
    finalInput.classList.remove('hidden');
    finalSubmit.classList.remove('hidden');
  } else if(phase==='final-answer'){
    phaseEl.textContent='Private response';
    finalCopy.textContent='Type your Final Jeopardy response. It stays hidden until the host reveals it.';
    finalClue.textContent=lastFinalState.clue||'';
    finalClue.classList.remove('hidden');
    if(lastFinalState.answerSubmitted){
      finalLocked.textContent='Answer submitted';
      finalLocked.classList.remove('hidden');
      finalCopy.textContent='Your response is submitted. Wait for the host adjudication.';
      return;
    }
    finalInput.type='text';
    finalInput.inputMode='text';
    finalInput.placeholder='What is...';
    finalInput.className='final-input answer';
    finalSubmit.textContent='Submit Answer';
    finalInput.classList.remove('hidden');
    finalSubmit.classList.remove('hidden');
  } else {
    phaseEl.textContent='Final review';
    finalCopy.textContent='Final Jeopardy is locked. Watch the host screen for the reveal.';
    finalLocked.textContent='Locked';
    finalLocked.classList.remove('hidden');
  }
}

function applyState(s){
  lastState=Object.assign(lastState,s);
  const {hasClue,activeIdx,attempted,ddSolo,cluePickerIdx}=lastState;
  let mode='disarmed', label='Waiting for clue…', phase='Board phase';
  if(hasClue){
    if(ddSolo){
      if(cluePickerIdx===myTeam){mode='you';label='Daily Double';phase='You play alone';}
      else{mode='disarmed';label='Watching…';phase='Daily Double — picker plays alone';}
    } else if(attempted.includes(myTeam)){
      mode='locked';label='Locked out';phase='You answered already';
    } else if(activeIdx===myTeam){
      mode='you';label='Answer!';phase='You buzzed in';
    } else if(activeIdx!=null){
      const otherName=`Team ${activeIdx+1}`;
      mode='disarmed';label='Wait…';phase=`${otherName} is answering`;
    } else {
      mode='armed';label='BUZZ';phase='Clue is live — buzz to answer';
    }
  }
  buzzBtn.className='btn-buzz '+mode;
  buzzBtn.textContent=label;
  buzzBtn.disabled=mode!=='armed';
  phaseEl.textContent=phase;
  // vibrate on arming transition
  if(mode==='armed' && !lastArmed)vibrate([60,40,60]);
  lastArmed=(mode==='armed');
  // Typed-answer panel: show only when this team is actively answering in verbal mode
  const showType=mode==='you' && lastState.allowTyping && lastState.hasClue;
  typePanel.classList.toggle('hidden',!showType);
  if(showType){
    if(document.activeElement!==typeInput && typeInput.value!==(lastState.typedAnswer||'')){
      typeInput.value=lastState.typedAnswer||'';
    }
  } else {
    typeInput.value='';
  }
}

if(!room){setStatus('Missing room code','error');phaseEl.textContent='Open the QR from the host screen';}
else{
  setStatus('Connecting…','connecting');
  const peer=new Peer({debug:0});
  let conn=null;
  peer.on('open',()=>{
    conn=peer.connect('jeop-'+room,{reliable:true});
    conn.on('open',()=>{
      connected=true;
      setStatus('Connected','connected');
      conn.send({type:'hello',team:myTeam});
    });
    conn.on('data',data=>{
      if(!data||typeof data!=='object')return;
      if(data.type==='ack')return;
      if(data.type==='state')applyState(data);
      if(data.type==='finalState')applyFinalState(data);
      if(data.type==='typedAnswer'){
        lastState.typedAnswer=String(data.text||'');
        if(document.activeElement!==typeInput)typeInput.value=lastState.typedAnswer;
      }
    });
    conn.on('close',()=>{
      connected=false;
      setStatus('Disconnected — reload page','error');
      buzzBtn.className='btn-buzz disarmed';
      buzzBtn.textContent='Disconnected';
      buzzBtn.disabled=true;
      phaseEl.textContent='';
    });
    conn.on('error',err=>{
      setStatus('Error: '+(err?.type||err?.message||'unknown'),'error');
    });
  });
  peer.on('error',err=>{
    setStatus('Peer error: '+(err?.type||'unknown'),'error');
    buzzBtn.className='btn-buzz disarmed';
    buzzBtn.disabled=true;
  });
  buzzBtn.addEventListener('click',()=>{
    if(buzzBtn.classList.contains('armed') && conn && conn.open){
      conn.send({type:'buzz',team:myTeam});
      buzzBtn.classList.add('flash');
      setTimeout(()=>buzzBtn.classList.remove('flash'),350);
      vibrate(50);
    } else {
      // Not armed → shake feedback
      buzzBtn.classList.add('shake');
      setTimeout(()=>buzzBtn.classList.remove('shake'),350);
      vibrate([20,40,20]);
    }
  });
  finalSubmit.addEventListener('click',()=>{
    if(!conn||!conn.open)return;
    const phase=lastFinalState.phase;
    if(phase==='final-wager'){
      const max=Number(lastFinalState.maxWager||0);
      const value=Math.max(0,Math.min(parseInt(finalInput.value,10)||0,max));
      conn.send({type:'finalWager',team:myTeam,value});
      finalSubmit.disabled=true;
      finalCopy.textContent='Wager sent. Waiting for the host...';
    } else if(phase==='final-answer'){
      const value=finalInput.value.trim();
      if(!value){
        finalInput.focus();
        vibrate([20,40,20]);
        return;
      }
      conn.send({type:'finalAnswer',team:myTeam,value});
      finalSubmit.disabled=true;
      finalCopy.textContent='Answer sent. Waiting for the host...';
    }
  });
  finalInput.addEventListener('keydown',e=>{
    if(e.key==='Enter'&&!finalSubmit.classList.contains('hidden'))finalSubmit.click();
  });
  typeInput.addEventListener('input',()=>{
    if(!conn||!conn.open)return;
    lastState.typedAnswer=typeInput.value;
    try{conn.send({type:'typing',team:myTeam,text:typeInput.value});}catch(e){}
  });
  typeInput.addEventListener('keydown',e=>{
    if(e.key!=='Enter')return;
    e.preventDefault();
    if(conn&&conn.open){
      lastState.typedAnswer=typeInput.value;
      try{conn.send({type:'typedSubmit',team:myTeam,text:typeInput.value});}catch(err){}
    }
    phaseEl.textContent='ANSWER SUBMITTED - wait for host';
    typeInput.blur();
    vibrate(35);
  });
}
</script>
</body>
</html>
