<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,maximum-scale=1" />
<meta name="theme-color" content="#0a0640" />
<title>Buzzer</title>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
html,body{margin:0;height:100%;overflow:hidden;background:#0a0640;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
body{display:flex;flex-direction:column;padding:20px;gap:14px}
.header{display:flex;align-items:center;justify-content:space-between;font-size:13px;color:#aaa}
.team-name{font-weight:900;font-size:24px;color:var(--team-color);text-align:center;letter-spacing:2px}
.status{text-align:center;font-size:14px;padding:8px;border-radius:8px;background:rgba(255,255,255,.06)}
.status.connecting{background:rgba(255,180,0,.15);color:#ffb400}
.status.connected{background:rgba(39,196,107,.15);color:#27c46b}
.status.error{background:rgba(231,76,60,.15);color:#e74c3c}
.phase{text-align:center;font-size:13px;color:#aaa;font-weight:700;letter-spacing:1px;text-transform:uppercase;min-height:18px}
.btn-buzz{flex:1;border:none;border-radius:32px;
  font-family:inherit;font-size:54px;font-weight:900;letter-spacing:4px;
  cursor:pointer;text-shadow:0 2px 0 rgba(0,0,0,.4);
  transition:transform .08s,box-shadow .12s,background .15s,opacity .15s;
  position:relative;overflow:hidden}
.btn-buzz.armed{background:var(--team-color);color:#fff;
  box-shadow:0 12px 0 rgba(0,0,0,.3),0 0 80px var(--team-color),0 0 60px rgba(255,255,255,.1) inset;
  animation:armedPulse 1.2s ease-in-out infinite}
.btn-buzz.armed:active{transform:translateY(8px);box-shadow:0 4px 0 rgba(0,0,0,.3),0 0 60px rgba(255,255,255,.2) inset}
.btn-buzz.disarmed{background:#1a1455;color:rgba(255,255,255,.35);
  box-shadow:0 4px 0 rgba(0,0,0,.2);cursor:not-allowed;font-size:22px}
.btn-buzz.locked{background:#3a1a1a;color:rgba(255,100,100,.5);
  box-shadow:0 4px 0 rgba(0,0,0,.2);cursor:not-allowed;font-size:22px}
.btn-buzz.you{background:linear-gradient(180deg,var(--team-color),rgba(0,0,0,.4));color:#fff;
  box-shadow:0 8px 0 rgba(0,0,0,.3);cursor:not-allowed;font-size:28px}
.btn-buzz.flash{animation:buzzFlash .35s}
.btn-buzz.shake{animation:buzzShake .35s}
@keyframes armedPulse{
  0%,100%{filter:brightness(1)}
  50%{filter:brightness(1.18)}
}
@keyframes buzzFlash{0%{filter:brightness(2.4)}100%{filter:brightness(1)}}
@keyframes buzzShake{0%{transform:translateX(0)}25%{transform:translateX(-12px)}50%{transform:translateX(12px)}75%{transform:translateX(-8px)}100%{transform:translateX(0)}}
.foot{font-size:10px;color:#555;text-align:center}
</style>
</head>
<body>
<div class="header">
  <span>Room <b id="room">—</b></span>
  <span id="status" class="status">Connecting…</span>
</div>
<div class="team-name" id="teamName">…</div>
<div class="phase" id="phase">&nbsp;</div>
<button class="btn-buzz disarmed" id="buzz" disabled>Waiting…</button>
<div class="foot">Keep this page open. Tap when armed.</div>

<script>
const params=new URLSearchParams(location.search);
const room=(params.get('room')||'').toUpperCase();
const myTeam=parseInt(params.get('team')||'0',10);
const myName=params.get('name')||`Team ${myTeam+1}`;
const color=params.get('color')||'#7a2bd6';

document.documentElement.style.setProperty('--team-color',color);
document.getElementById('room').textContent=room||'?';
document.getElementById('teamName').textContent=myName;
document.title=`Buzzer — ${myName}`;

const statusEl=document.getElementById('status');
const phaseEl=document.getElementById('phase');
const buzzBtn=document.getElementById('buzz');

let connected=false;
let lastArmed=false;
let lastState={hasClue:false,activeIdx:null,attempted:[],ddSolo:false,cluePickerIdx:null};

function setStatus(msg,kind){
  statusEl.textContent=msg;
  statusEl.className='status '+(kind||'');
}
function vibrate(pat){if(navigator.vibrate)navigator.vibrate(pat);}

function applyState(s){
  lastState=Object.assign(lastState,s);
  const {hasClue,activeIdx,attempted,ddSolo,cluePickerIdx}=lastState;
  let mode='disarmed', label='Waiting for clue…', phase='Board phase';
  if(hasClue){
    if(ddSolo){
      if(cluePickerIdx===myTeam){mode='you';label='Daily Double';phase='You play alone';}
      else{mode='disarmed';label='Watching…';phase='Daily Double — picker plays alone';}
    } else if(attempted.includes(myTeam)){
      mode='locked';label='Locked out';phase='You answered already';
    } else if(activeIdx===myTeam){
      mode='you';label='Answer!';phase='You buzzed in';
    } else if(activeIdx!=null){
      const otherName=`Team ${activeIdx+1}`;
      mode='disarmed';label='Wait…';phase=`${otherName} is answering`;
    } else {
      mode='armed';label='BUZZ';phase='Clue is live — buzz to answer';
    }
  }
  buzzBtn.className='btn-buzz '+mode;
  buzzBtn.textContent=label;
  buzzBtn.disabled=mode!=='armed';
  phaseEl.textContent=phase;
  // vibrate on arming transition
  if(mode==='armed' && !lastArmed)vibrate([60,40,60]);
  lastArmed=(mode==='armed');
}

let activeRoom=room;
let peer=null, conn=null, retries=0, retryTimer=null;

function promptRoom(){
  const code=(prompt('Enter the 4-character room code shown on the host screen:')||'').trim().toUpperCase();
  if(code&&/^[A-Z0-9]{4}$/.test(code)){
    activeRoom=code;
    document.getElementById('room').textContent=code;
    startConnect();
  } else if(code){
    alert('Room code must be 4 letters/numbers.');
  }
}

function startConnect(){
  if(!activeRoom){setStatus('Tap to enter room code','error');return;}
  setStatus(retries>0?`Reconnecting (try ${retries})…`:'Connecting…','connecting');
  try{if(peer)peer.destroy();}catch(e){}
  peer=new Peer({debug:0});
  peer.on('open',()=>{
    conn=peer.connect('jeop-'+activeRoom,{reliable:true});
    conn.on('open',()=>{
      connected=true;retries=0;
      setStatus('Connected','connected');
      conn.send({type:'hello',team:myTeam});
    });
    conn.on('data',data=>{
      if(!data||typeof data!=='object')return;
      if(data.type==='ack')return;
      if(data.type==='state')applyState(data);
    });
    conn.on('close',()=>{
      connected=false;
      buzzBtn.className='btn-buzz disarmed';
      buzzBtn.textContent='Reconnecting…';
      buzzBtn.disabled=true;
      phaseEl.textContent='';
      scheduleReconnect();
    });
    conn.on('error',()=>{});
  });
  peer.on('disconnected',()=>{try{peer.reconnect();}catch(e){scheduleReconnect();}});
  peer.on('error',err=>{
    const t=err?.type||'unknown';
    setStatus('Peer error: '+t,'error');
    buzzBtn.className='btn-buzz disarmed';buzzBtn.disabled=true;
    if(['peer-unavailable','server-error','socket-error','socket-closed','network'].includes(t)){
      scheduleReconnect();
    }
  });
}
function scheduleReconnect(){
  if(retryTimer)return;
  retries++;
  if(retries>10){
    setStatus('Could not reach host — tap to retry','error');
    statusEl.style.cursor='pointer';
    statusEl.onclick=()=>{retries=0;statusEl.onclick=null;statusEl.style.cursor='';startConnect();};
    return;
  }
  const delay=Math.min(1000*Math.pow(1.5,retries-1),6000);
  retryTimer=setTimeout(()=>{retryTimer=null;startConnect();},delay);
}

if(!activeRoom){
  setStatus('Tap to enter room code','error');
  phaseEl.textContent='Open the QR from the host screen, or enter code manually';
  statusEl.style.cursor='pointer';
  statusEl.onclick=promptRoom;
} else {
  startConnect();
}

buzzBtn.addEventListener('click',()=>{
  if(buzzBtn.classList.contains('armed') && conn && conn.open){
    conn.send({type:'buzz',team:myTeam});
    buzzBtn.classList.add('flash');
    setTimeout(()=>buzzBtn.classList.remove('flash'),350);
    vibrate(50);
  } else {
    buzzBtn.classList.add('shake');
    setTimeout(()=>buzzBtn.classList.remove('shake'),350);
    vibrate([20,40,20]);
  }
});
</script>
</body>
</html>
