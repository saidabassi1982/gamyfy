<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Guess the Villain - Phone Buzzer</title>
    <style>
      :root{--gold:#f6c85f;--violet:#a78bfa;--paper:#f4f0e9;--muted:#9da4b4;--panel:#111522}*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:22px;background:radial-gradient(circle at 50% 0,#243451 0,transparent 42%),#090b11;color:var(--paper);font:16px system-ui}main{width:min(460px,100%);text-align:center}h1{margin:0 0 6px;letter-spacing:.08em}#status{min-height:48px;color:#d9deea;line-height:1.45}input,button{width:100%;border:0;border-radius:12px;padding:16px;font:inherit;margin:8px 0}input{background:#1b2130;color:#fff}button{font-weight:900;color:#20190b;background:var(--gold)}fieldset{margin:14px 0;border:1px solid #30384c;border-radius:14px;padding:10px}legend{padding:0 8px;color:var(--muted);font-size:12px;font-weight:800}.team-options{display:grid;grid-template-columns:1fr 1fr;gap:8px}.team-option{display:block;padding:14px 8px;border:2px solid transparent;border-radius:11px;background:#171c29;font-weight:850;cursor:pointer}.team-option input{position:absolute;opacity:0;width:1px}.team-option:has(input:checked){border-color:var(--gold);background:#292315}.team-option.violet:has(input:checked){border-color:var(--violet);background:#201a34}.team-badge{display:inline-block;margin-bottom:8px;padding:7px 12px;border:1px solid var(--gold);border-radius:999px;color:var(--gold);font-size:12px;font-weight:900;letter-spacing:.08em}.team-badge.b{border-color:var(--violet);color:var(--violet)}.buzz{border-radius:50%;width:230px;height:230px;font-size:30px;background:var(--gold);box-shadow:0 0 0 14px #f6c85f22;transition:.2s transform,.2s filter}.buzz.team-b{background:var(--violet);box-shadow:0 0 0 14px #a78bfa22}.buzz:active{transform:scale(.94)}.buzz:disabled{opacity:.5}.buzz.accepted{animation:buzzWin .65s ease-in-out infinite}.result{margin:14px 0;padding:18px;border:2px solid #30384c;border-radius:14px;font-size:20px;font-weight:900}.result.correct{border-color:#62d69a;background:#10251d;color:#8ef0ba}.result.wrong{border-color:#ff7272;background:#2b1117;color:#ff9a9a}@keyframes buzzWin{50%{transform:scale(1.06);filter:brightness(1.2)}}small{display:block;margin-top:12px;color:var(--muted);line-height:1.4}
    </style>
  </head>
  <body>
    <main>
      <h1>LIVE BUZZER</h1>
      <p id="status">Enter your name and choose your team.</p>
      <section id="join">
        <input id="name" autocomplete="name" placeholder="Your name">
        <fieldset><legend>Choose your team</legend><div class="team-options"><label class="team-option"><input type="radio" name="team" value="a" checked><span id="teamAName">Team Gold</span></label><label class="team-option violet"><input type="radio" name="team" value="b"><span id="teamBName">Team Violet</span></label></div></fieldset>
        <button id="joinBtn">Join buzzer room</button>
      </section>
      <section id="play" hidden>
        <span class="team-badge" id="teamBadge">TEAM GOLD</span>
        <button class="buzz" id="buzz" disabled>WAITING</button>
        <div id="answer" hidden><input id="answerInput" autocomplete="off" placeholder="Villain or actor name"><button id="send">Send typed answer</button></div>
        <div class="result" id="result" hidden></div>
        <small id="rule">The host will open buzzing when the picture appears. You may also shout your answer.</small>
      </section>
    </main>
    <script src="assets/vendor/peerjs.min.js"></script>
    <script>
      const query = new URLSearchParams(location.search), room = query.get('room'), $ = (selector) => document.querySelector(selector);
      let peer, conn, audio, team = 'a', teamNames = { a: 'Team Gold', b: 'Team Violet' }, lastResult = '';
      function tone(frequency, duration, type = 'sine') { try { audio ||= new (window.AudioContext || window.webkitAudioContext)(); if (audio.state === 'suspended') audio.resume(); const oscillator = audio.createOscillator(), gain = audio.createGain(); oscillator.frequency.value = frequency; oscillator.type = type; gain.gain.setValueAtTime(.09, audio.currentTime); gain.gain.exponentialRampToValueAtTime(.0001, audio.currentTime + duration); oscillator.connect(gain).connect(audio.destination); oscillator.start(); oscillator.stop(audio.currentTime + duration); } catch {} }
      function setMode(mode) { const mastermind = mode === 'mastermind'; $('#answerInput').placeholder = mastermind ? 'Character name only' : 'Villain or actor name'; $('#rule').textContent = mastermind ? 'Character names only. You may type or shout your answer.' : 'Villain or actor accepted. You may type or shout your answer.'; }
      function applyTeamNames(names = teamNames) { teamNames = { ...teamNames, ...names }; $('#teamAName').textContent = teamNames.a; $('#teamBName').textContent = teamNames.b; $('#teamBadge').textContent = teamNames[team].toUpperCase(); $('#teamBadge').className = `team-badge ${team}`; $('#buzz').className = `buzz team-${team}`; }
      function showResult(kind, text) { lastResult = kind; $('#result').hidden = false; $('#result').className = `result ${kind}`; $('#result').textContent = text; }
      function resetQuestion() { lastResult = ''; $('#result').hidden = true; $('#answer').hidden = true; $('#answerInput').value = ''; $('#send').disabled = false; $('#buzz').classList.remove('accepted'); }
      $('#joinBtn').onclick = () => {
        const name = $('#name').value.trim(); team = document.querySelector('input[name="team"]:checked').value; if (!name || !room) { $('#status').textContent = 'Enter your name and open a valid room link.'; return; }
        applyTeamNames(); peer = new Peer();
        peer.on('open', () => {
          conn = peer.connect(`villain-${room}`);
          conn.on('open', () => { conn.send({ type: 'join', name, team }); $('#join').hidden = true; $('#play').hidden = false; $('#status').textContent = `Connected to ${teamNames[team]}. Waiting for the host.`; });
          conn.on('data', (message) => {
            if (message.teamNames) applyTeamNames(message.teamNames); if (message.mode) setMode(message.mode);
            if (message.type === 'joined') { team = message.team || team; applyTeamNames(message.teamNames); if (message.playStyle === 'host') { resetQuestion(); $('#buzz').disabled = true; $('#buzz').textContent = 'HOST MODE'; $('#status').textContent = 'Host / Shout Mode is selected. Shout answers to the host.'; } }
            if (message.type === 'question-live') { resetQuestion(); $('#buzz').disabled = false; $('#buzz').textContent = 'BUZZ!'; $('#status').textContent = message.mode === 'mastermind' ? 'Character-only question - buzz or shout!' : 'Villain or actor accepted - buzz or shout!'; }
            if (message.type === 'buzz-accepted') { $('#answer').hidden = false; $('#buzz').disabled = true; $('#buzz').textContent = 'YOU BUZZED!'; $('#buzz').classList.add('accepted'); $('#status').textContent = 'You buzzed first - type your answer or shout it now.'; tone(760, .12); setTimeout(() => tone(980, .18), 100); navigator.vibrate?.([80,45,150]); $('#answerInput').focus(); }
            if (message.type === 'state') { const locked = message.lockedTeams?.includes(team) || message.locked?.includes(peer.id); if (message.playStyle === 'host') { $('#buzz').disabled = true; $('#buzz').textContent = 'HOST MODE'; $('#status').textContent = 'Shout your answer to the host.'; return; } $('#buzz').disabled = locked || !!message.active; $('#buzz').textContent = locked ? 'TEAM LOCKED' : message.active === peer.id ? 'YOU BUZZED!' : message.active ? 'OTHER TEAM BUZZED' : 'BUZZ!'; if (locked) { $('#answer').hidden = true; if (lastResult !== 'wrong') showResult('wrong', `${teamNames[team]} is locked out`); $('#status').textContent = `${teamNames[team]} is locked out. ${teamNames[team === 'a' ? 'b' : 'a']} may buzz or shout.`; } else if (!message.active && !lastResult) { $('#answer').hidden = true; $('#status').textContent = 'Buzzing is open.'; } }
            if (message.type === 'answer-result') { $('#answer').hidden = true; $('#buzz').classList.remove('accepted'); if (message.correct) { showResult('correct', `CORRECT! +${message.points || 1}`); $('#status').textContent = message.judgedByHost ? `Host awarded the point to ${message.teamName || teamNames[team]}.` : `${message.teamName || teamNames[team]} scored automatically.`; tone(880,.12); setTimeout(()=>tone(1100,.2),110); navigator.vibrate?.([70,40,70,40,180]); } else { showResult('wrong', 'WRONG - TEAM LOCKED'); $('#status').textContent = `${message.otherTeamName || teamNames[team === 'a' ? 'b' : 'a']} may now buzz or shout.`; tone(180,.22,'sawtooth'); navigator.vibrate?.([250]); } }
            if (message.type === 'question-closed') { if (message.reason === 'host-mode') { resetQuestion(); $('#buzz').disabled = true; $('#buzz').textContent = 'HOST MODE'; $('#status').textContent = 'Host / Shout Mode - answer aloud.'; return; } $('#answer').hidden = true; $('#buzz').disabled = true; $('#buzz').classList.remove('accepted'); if (!lastResult) { $('#buzz').textContent = 'WAITING'; $('#status').textContent = 'Question closed. Waiting for the next villain.'; } }
          });
          conn.on('close', () => { $('#status').textContent = 'Connection closed. Refresh to rejoin.'; $('#buzz').disabled = true; });
        });
        peer.on('error', () => { $('#status').textContent = 'Could not connect. Check the room link and try again.'; });
      };
      $('#buzz').onclick = () => { if (!conn?.open) return; tone(300,.06); navigator.vibrate?.(25); conn.send({ type:'buzz' }); };
      function sendAnswer() { const answer = $('#answerInput').value.trim(); if (!answer || !conn?.open) return; $('#send').disabled = true; conn.send({ type:'answer', answer }); $('#status').textContent = 'Answer sent - judging automatically...'; }
      $('#send').onclick = sendAnswer; $('#answerInput').addEventListener('keydown', (event) => { if (event.key === 'Enter') sendAnswer(); });
    </script>
  </body>
</html>
