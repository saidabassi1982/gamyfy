<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Villain Buzzer</title><style>body{margin:0;min-height:100vh;display:grid;place-items:center;background:#090b11;color:#f4f0e9;font:16px system-ui}main{width:min(440px,90vw);text-align:center}input,button{width:100%;box-sizing:border-box;border:0;border-radius:12px;padding:16px;font:inherit;margin:8px 0}input{background:#1b2130;color:white}button{font-weight:900;color:#20190b;background:#f6c85f}.buzz{border-radius:50%;width:230px;height:230px;font-size:30px;background:#a78bfa;box-shadow:0 0 0 14px #a78bfa22}small{color:#9da4b4}</style></head><body><main><h1>LIVE BUZZER</h1><p id="status">Enter your name to join.</p><section id="join"><input id="name" placeholder="Your name or team"><button id="joinBtn">Join room</button></section><section id="play" hidden><button class="buzz" id="buzz">BUZZ!</button><div id="answer" hidden><input id="answerInput" placeholder="Villain or actor name"><button id="send">Send answer</button></div><small>Only buzz when the host has shown a question.</small></section></main><script src="assets/vendor/peerjs.min.js"></script><script>const q=new URLSearchParams(location.search),room=q.get('room'),$=s=>document.querySelector(s);let peer,conn,id;$('#joinBtn').onclick=()=>{const n=$('#name').value.trim();if(!n||!room)return;peer=new Peer();peer.on('open',()=>{conn=peer.connect('villain-'+room);conn.on('open',()=>{conn.send({type:'join',name:n});$('#join').hidden=true;$('#play').hidden=false;$('#status').textContent='Connected. Ready to buzz.'});conn.on('data',m=>{if(m.type==='buzz-accepted'){$('#answer').hidden=false;$('#status').textContent='You buzzed first — type your answer.'}if(m.type==='state'){const locked=m.locked?.includes(peer.id);$('#buzz').disabled=locked||!!m.active;$('#buzz').textContent=locked?'LOCKED OUT':m.active?'WAIT…':'BUZZ!';if(!locked&&!m.active){$('#answer').hidden=true;$('#status').textContent='Buzzing is open.'}}if(m.type==='question-live'){$('#buzz').disabled=false;$('#buzz').textContent='BUZZ!';$('#status').textContent='Question live — buzz first!'}})})};$('#buzz').onclick=()=>conn.send({type:'buzz'});$('#send').onclick=()=>{conn.send({type:'answer',answer:$('#answerInput').value.trim()});$('#status').textContent='Answer sent — waiting for host.'}</script></body></html>
