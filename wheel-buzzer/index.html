<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,maximum-scale=1" />
<meta name="theme-color" content="#0a1024" />
<title>Wheel Buzzer</title>
<script src="assets/vendor/peerjs.min.js"></script>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
html,body{margin:0;height:100%;overflow:hidden;background:#0a1024;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
body{display:flex;flex-direction:column;padding:20px;gap:14px}
.header{display:flex;align-items:center;justify-content:space-between;font-size:13px;color:#b6c6dd}
.player-name{font-weight:900;font-size:26px;color:var(--player-color);text-align:center;letter-spacing:2px;text-transform:uppercase}
.status{text-align:center;font-size:14px;padding:8px;border-radius:8px;background:rgba(255,255,255,.06)}
.status.connecting{background:rgba(245,200,66,.16);color:#f5c842}
.status.connected{background:rgba(34,197,94,.16);color:#4ade80}
.status.error{background:rgba(239,68,68,.16);color:#fca5a5}
.phase{text-align:center;font-size:13px;color:#b6c6dd;font-weight:800;letter-spacing:1px;text-transform:uppercase;min-height:18px}
.btn-buzz{flex:1;border:none;border-radius:32px;font-family:inherit;font-size:54px;font-weight:900;letter-spacing:4px;cursor:pointer;text-shadow:0 2px 0 rgba(0,0,0,.4);transition:transform .08s,box-shadow .12s,background .15s,opacity .15s;position:relative;overflow:hidden}
.btn-buzz.armed{background:var(--player-color);color:#fff;box-shadow:0 12px 0 rgba(0,0,0,.35),0 0 80px var(--player-color),0 0 60px rgba(255,255,255,.12) inset;animation:armedPulse 1.2s ease-in-out infinite}
.btn-buzz.armed:active{transform:translateY(8px);box-shadow:0 4px 0 rgba(0,0,0,.35),0 0 60px rgba(255,255,255,.22) inset}
.btn-buzz.disarmed{background:#11183a;color:rgba(255,255,255,.4);box-shadow:0 4px 0 rgba(0,0,0,.25);cursor:not-allowed;font-size:22px;letter-spacing:1px}
.btn-buzz.you{background:linear-gradient(180deg,var(--player-color),rgba(0,0,0,.35));color:#fff;box-shadow:0 8px 0 rgba(0,0,0,.35);cursor:not-allowed;font-size:28px;letter-spacing:1px}
.btn-buzz.other{background:#1f2937;color:#cbd5e1;box-shadow:0 4px 0 rgba(0,0,0,.25);cursor:not-allowed;font-size:22px;letter-spacing:1px}
.btn-buzz.flash{animation:buzzFlash .35s}
.btn-buzz.shake{animation:buzzShake .35s}
.answer-card{display:none;flex:1;flex-direction:column;gap:14px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:24px;padding:18px}
.answer-card.active{display:flex}
.answer-kicker{font-size:12px;color:#facc15;font-weight:900;letter-spacing:2px;text-transform:uppercase;text-align:center}
.answer-question{flex:1;display:flex;align-items:center;justify-content:center;text-align:center;font-size:28px;font-weight:900;line-height:1.18}
.answer-input{width:100%;min-height:54px;border:1px solid rgba(255,255,255,.18);border-radius:14px;background:#0a1024;color:#fff;font-size:22px;font-weight:800;padding:0 14px;text-align:center;user-select:text;-webkit-user-select:text;text-transform:uppercase}
.answer-submit{min-height:58px;border:none;border-radius:14px;background:linear-gradient(180deg,var(--player-color),rgba(0,0,0,.25));color:#fff;font-size:18px;font-weight:900;letter-spacing:1px}
.answer-note{text-align:center;color:#b6c6dd;font-size:12px;font-weight:700;min-height:18px}
@keyframes armedPulse{0%,100%{filter:brightness(1)}50%{filter:brightness(1.18)}}
@keyframes buzzFlash{0%{filter:brightness(2.4)}100%{filter:brightness(1)}}
@keyframes buzzShake{0%{transform:translateX(0)}25%{transform:translateX(-12px)}50%{transform:translateX(12px)}75%{transform:translateX(-8px)}100%{transform:translateX(0)}}
.foot{font-size:10px;color:#64748b;text-align:center}
</style>
</head>
<body>
<div class="header">
  <span>Room <b id="room">-</b></span>
  <span id="status" class="status">Connecting...</span>
</div>
<div class="player-name" id="playerName">Player</div>
<div class="phase" id="phase">&nbsp;</div>
<button class="btn-buzz disarmed" id="buzz" disabled>Waiting...</button>
<div class="answer-card" id="answerCard">
  <div class="answer-kicker" id="answerKicker">Your Answer</div>
  <div class="answer-question" id="answerQuestion"></div>
  <input class="answer-input" id="answerInput" type="text" maxlength="60" autocomplete="off" autocapitalize="characters" />
  <button class="answer-submit" id="answerSubmit">Submit Answer</button>
  <div class="answer-note" id="answerNote"></div>
</div>
<div class="foot">Keep this page open. Buzzers go live automatically each round. If the page closes, reopen this same link and it rejoins the room.</div>

<script>
const params = new URLSearchParams(location.search);
const room = (params.get('room') || '').toUpperCase();
const myPlayer = parseInt(params.get('p') ?? params.get('team') ?? '0', 10);
const myName = params.get('name') || `Player ${myPlayer + 1}`;
const color = params.get('color') || '#27d4e8';
let activeRoom = room;
let peer = null;
let conn = null;
let retries = 0;
let retryTimer = null;
let wakeLock = null;

document.documentElement.style.setProperty('--player-color', color);
document.getElementById('room').textContent = activeRoom || '?';
document.getElementById('playerName').textContent = myName;
document.title = `Wheel Buzzer - ${myName}`;

const statusEl = document.getElementById('status');
const phaseEl = document.getElementById('phase');
const buzzBtn = document.getElementById('buzz');
const answerCard = document.getElementById('answerCard');
const answerKicker = document.getElementById('answerKicker');
const answerQuestion = document.getElementById('answerQuestion');
const answerInput = document.getElementById('answerInput');
const answerSubmit = document.getElementById('answerSubmit');
const answerNote = document.getElementById('answerNote');
let lastArmed = false;
let lastState = { armed: false, winnerIdx: null, players: [] };
let activePrompt = null;

function setStatus(msg, kind) {
  statusEl.textContent = msg;
  statusEl.className = 'status ' + (kind || '');
}
function vibrate(pattern) {
  if (navigator.vibrate) navigator.vibrate(pattern);
}
async function requestWakeLock() {
  if (!('wakeLock' in navigator) || wakeLock) return;
  try {
    wakeLock = await navigator.wakeLock.request('screen');
    wakeLock.addEventListener('release', () => { wakeLock = null; });
  } catch (err) {}
}
function reconnectIfNeeded() {
  if (document.hidden) return;
  requestWakeLock();
  if (!conn || !conn.open) {
    retries = 0;
    clearTimeout(retryTimer);
    retryTimer = null;
    startConnect();
  }
}
function applyState(state) {
  if (activePrompt) return;
  // Accept either `players` (wheel) or `teams` (legacy) as the label list.
  if (state.players === undefined && state.teams !== undefined) state.players = state.teams;
  lastState = Object.assign(lastState, state);
  const winnerIdx = lastState.winnerIdx;
  let mode = 'disarmed';
  let label = 'Waiting...';
  let phase = 'Waiting for the next live buzzer';

  if (winnerIdx === myPlayer) {
    mode = 'you';
    label = 'You buzzed in!';
    phase = 'Call out your answer!';
  } else if (winnerIdx !== null && winnerIdx !== undefined) {
    mode = 'other';
    label = 'Stand by';
    phase = `${lastState.players[winnerIdx] || 'Another player'} buzzed first`;
  } else if (lastState.armed) {
    mode = 'armed';
    label = 'BUZZ';
    phase = 'Buzzers are live';
  }

  buzzBtn.className = 'btn-buzz ' + mode;
  buzzBtn.textContent = label;
  buzzBtn.disabled = mode !== 'armed';
  phaseEl.textContent = phase;

  if (mode === 'armed' && !lastArmed) vibrate([60, 40, 60]);
  lastArmed = mode === 'armed';
}

function showAnswerPrompt(data) {
  activePrompt = Object.assign({ mode: 'game-answer' }, data);
  buzzBtn.style.display = 'none';
  answerCard.classList.add('active');
  answerKicker.textContent = data.playerName ? `${data.playerName} — SOLVE` : 'Your Answer';
  answerQuestion.textContent = data.question || 'Type your answer';
  answerInput.value = '';
  answerInput.disabled = false;
  answerSubmit.disabled = false;
  answerSubmit.textContent = 'Submit Answer';
  answerNote.textContent = 'Type the full phrase and submit before time runs out.';
  phaseEl.textContent = 'Solve now';
  setTimeout(() => answerInput.focus(), 80);
  vibrate([50, 30, 50]);
}

function clearAnswerPrompt(message) {
  activePrompt = null;
  answerCard.classList.remove('active');
  buzzBtn.style.display = '';
  answerNote.textContent = '';
  phaseEl.textContent = message || 'Waiting for the next live buzzer';
  applyState(lastState);
}

function promptRoom() {
  const code = (prompt('Enter the 4-character room code from the host screen:') || '').trim().toUpperCase();
  if (!code) return;
  if (!/^[A-Z0-9]{4}$/.test(code)) {
    alert('Room code must be 4 letters/numbers.');
    return;
  }
  activeRoom = code;
  document.getElementById('room').textContent = activeRoom;
  retries = 0;
  statusEl.onclick = null;
  statusEl.style.cursor = '';
  startConnect();
}

function scheduleReconnect() {
  if (retryTimer) return;
  retries++;
  if (retries > 10) {
    setStatus('Could not reach host - tap to retry', 'error');
    statusEl.style.cursor = 'pointer';
    statusEl.onclick = () => {
      retries = 0;
      statusEl.onclick = null;
      statusEl.style.cursor = '';
      startConnect();
    };
    return;
  }
  const delay = Math.min(1000 * Math.pow(1.5, retries - 1), 6000);
  retryTimer = setTimeout(() => {
    retryTimer = null;
    startConnect();
  }, delay);
}

function startConnect() {
  if (!activeRoom) {
    setStatus('Tap to enter room code', 'error');
    phaseEl.textContent = 'Scan QR or enter the host room code';
    statusEl.style.cursor = 'pointer';
    statusEl.onclick = promptRoom;
    return;
  }
  if (typeof Peer === 'undefined') {
    setStatus('PeerJS not loaded', 'error');
    phaseEl.textContent = 'Check internet connection';
    return;
  }

  setStatus(retries > 0 ? `Reconnecting (${retries})...` : 'Connecting...', 'connecting');
  try { if (peer) peer.destroy(); } catch (err) {}
  peer = new Peer({ debug: 0 });
  peer.on('open', () => {
    conn = peer.connect('wheel-' + activeRoom, { reliable: true });
    conn.on('open', () => {
      retries = 0;
      setStatus('Connected', 'connected');
      // Send both keys so an older/newer host both understand us.
      conn.send({ type: 'hello', player: myPlayer, team: myPlayer });
    });
    conn.on('data', data => {
      if (!data || typeof data !== 'object') return;
      if (data.type === 'state') applyState(data);
      if (data.type === 'answer-prompt') showAnswerPrompt(data);
      if (data.type === 'answer-clear') clearAnswerPrompt();
    });
    conn.on('close', () => {
      setStatus('Reconnecting...', 'connecting');
      buzzBtn.className = 'btn-buzz disarmed';
      buzzBtn.textContent = 'Reconnecting...';
      buzzBtn.disabled = true;
      phaseEl.textContent = '';
      scheduleReconnect();
    });
    conn.on('error', () => scheduleReconnect());
  });
  peer.on('disconnected', () => {
    try { peer.reconnect(); } catch (err) { scheduleReconnect(); }
  });
  peer.on('error', err => {
    const type = err?.type || 'unknown';
    setStatus('Peer error: ' + type, 'error');
    buzzBtn.className = 'btn-buzz disarmed';
    buzzBtn.disabled = true;
    if (['peer-unavailable', 'server-error', 'socket-error', 'socket-closed', 'network'].includes(type)) {
      scheduleReconnect();
    }
  });
}

startConnect();
requestWakeLock();
document.addEventListener('visibilitychange', reconnectIfNeeded);
window.addEventListener('online', reconnectIfNeeded);
window.addEventListener('pageshow', reconnectIfNeeded);
document.addEventListener('pointerdown', requestWakeLock, { once: false });

buzzBtn.addEventListener('click', () => {
  requestWakeLock();
  if (buzzBtn.classList.contains('armed') && conn && conn.open) {
    conn.send({ type: 'buzz', player: myPlayer, team: myPlayer });
    buzzBtn.classList.add('flash');
    setTimeout(() => buzzBtn.classList.remove('flash'), 350);
    vibrate(50);
  } else {
    buzzBtn.classList.add('shake');
    setTimeout(() => buzzBtn.classList.remove('shake'), 350);
    vibrate([20, 40, 20]);
  }
});

function submitAnswer() {
  if (!activePrompt || !conn || !conn.open) return;
  const answer = answerInput.value.trim();
  if (!answer) {
    answerNote.textContent = 'Enter an answer first.';
    vibrate([20, 40, 20]);
    return;
  }
  conn.send({ type: 'game-answer', player: myPlayer, team: myPlayer, answer });
  answerInput.disabled = true;
  answerSubmit.disabled = true;
  answerSubmit.textContent = 'Submitted';
  answerNote.textContent = 'Answer sent. Watch the game board.';
  vibrate(40);
  setTimeout(() => clearAnswerPrompt('Answer sent. Watch the board.'), 260);
}

answerSubmit.addEventListener('click', submitAnswer);
answerInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') submitAnswer();
});
</script>
</body>
</html>
